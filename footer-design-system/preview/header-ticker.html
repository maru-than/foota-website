<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:0;}
  .nav{display:flex;align-items:center;height:64px;padding:0 28px;border-bottom:1px solid var(--line-accent);gap:32px;}
  .logo{font:400 24px/1 var(--font-display);text-transform:uppercase;color:var(--accent);letter-spacing:-.03em;}
  .links{display:flex;gap:24px;flex:1;}
  .links a{font:600 13px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.12em;color:var(--fg-2);}
  .links a.active{color:var(--accent);}
  .right{display:flex;gap:18px;align-items:center;font:600 13px/1 var(--font-ui);letter-spacing:.04em;color:var(--fg-1);}
  .bag{padding:8px 14px;border:1px solid var(--line-accent);display:inline-flex;gap:8px;font-weight:700;letter-spacing:-.03em;}
  .bag b{color:var(--accent);}
  .ticker{display:flex;align-items:center;height:28px;padding:0 28px;background:var(--accent);color:#111;font:700 11px/1 var(--font-ui);letter-spacing:.18em;text-transform:uppercase;gap:32px;overflow:hidden;}
  .ticker span{white-space:nowrap;}
  .ticker .dot{width:4px;height:4px;background:#111;border-radius:50%;}
</style></head>
<body><div class="wrap">
  <div class="ticker"><span>New drop · Real Madrid 24/25</span><span class="dot"></span><span>Free shipping over 60 €</span><span class="dot"></span><span>Imported · Dispatched in 48h</span></div>
  <div class="nav">
    <div class="logo">Foota</div>
    <div class="links"><a class="active">Shop</a><a>National</a><a>Clubs</a><a>Retro</a><a>Custom</a></div>
    <div class="right"><span>Search</span><span>Account</span><span class="bag">Bag <b>2</b></span></div>
  </div>
</div></body></html>
