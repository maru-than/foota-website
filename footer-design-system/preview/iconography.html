<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:20px 24px;display:flex;align-items:center;gap:16px;}
  .icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:var(--fg-1);border:1px solid var(--line-1);}
  .icon svg{width:22px;height:22px;}
  .note{flex:1;font:500 12px/1.5 var(--font-ui);color:var(--fg-3);letter-spacing:-.02em;border-left:1px solid var(--line-accent);padding-left:14px;}
  .note b{color:var(--accent);font-weight:700;}
</style></head>
<body><div class="wrap">
  <div class="icon" title="bag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M5 7h14l-1.2 12.4a2 2 0 0 1-2 1.6H8.2a2 2 0 0 1-2-1.6L5 7Z"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg></div>
  <div class="icon" title="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="11" cy="11" r="6.5"/><path d="m20 20-4-4"/></svg></div>
  <div class="icon" title="user"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="9" r="3.5"/><path d="M5 20c1.4-3.5 4-5 7-5s5.6 1.5 7 5"/></svg></div>
  <div class="icon" title="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M5 12h14m-5-5 5 5-5 5"/></svg></div>
  <div class="icon" title="heart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.5-7 10-7 10Z"/></svg></div>
  <div class="icon" title="filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 6h16M7 12h10m-7 6h4"/></svg></div>
  <div class="icon" title="globe"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="8"/><path d="M4 12h16M12 4c2.5 3 2.5 13 0 16M12 4c-2.5 3-2.5 13 0 16"/></svg></div>
  <div class="note"><b>Lucide-style · 1.4px stroke · 24px box.</b> Outline only, no fills. Sharp joins. Pair with Geist labels in uppercase. Substitute closest Lucide icon when adding more — never invent.</div>
</div></body></html>
