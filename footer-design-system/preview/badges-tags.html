<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:24px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .b{font:600 11px/1 var(--font-ui);letter-spacing:.12em;text-transform:uppercase;padding:6px 10px;}
  .new{background:var(--accent);color:#111;}
  .limited{background:transparent;color:var(--accent);border:1px solid var(--accent);}
  .sale{background:#FF5C5C;color:#111;}
  .sold{background:var(--bg-3);color:var(--fg-3);border:1px solid var(--line-1);}
  .pill{font:600 12px/1 var(--font-ui);letter-spacing:-.02em;text-transform:none;padding:6px 12px;border-radius:999px;border:1px solid var(--line-accent);color:var(--fg-1);display:inline-flex;gap:6px;align-items:center;}
  .pill.active{background:var(--accent);color:#111;border-color:var(--accent);}
  .pill .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;}
  .pill.active .dot{background:#111;}
</style></head>
<body><div class="wrap">
  <span class="b new">New drop</span>
  <span class="b limited">Limited</span>
  <span class="b sale">−30%</span>
  <span class="b sold">Sold out</span>
  <span class="pill"><span class="dot"></span>La Liga</span>
  <span class="pill active">Spain</span>
  <span class="pill">Premier League</span>
  <span class="pill">Retro</span>
</div></body></html>
