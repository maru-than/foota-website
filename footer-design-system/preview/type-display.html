<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:24px 28px;display:flex;align-items:flex-end;gap:28px;border-bottom:1px solid var(--line-accent);}
  .specimen{font-family:var(--font-display);color:var(--accent);text-transform:uppercase;letter-spacing:-0.03em;line-height:.9;}
  .x96{font-size:96px;}
  .meta{display:flex;flex-direction:column;gap:8px;padding-bottom:8px;border-left:1px solid var(--line-1);padding-left:24px;}
  .l{font:600 11px/1 var(--font-ui);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);}
  .v{font:700 13px/1.3 var(--font-ui);color:var(--fg-1);letter-spacing:-.03em;}
  .v small{color:var(--fg-3);font-weight:500;}
</style></head>
<body><div class="wrap">
  <div class="specimen x96">FOOTA</div>
  <div class="meta">
    <div><span class="l">Family</span><div class="v">Sonara · Display</div></div>
    <div><span class="l">Usage</span><div class="v">Logo, hero, large numerals</div></div>
    <div><span class="l">Sizes</span><div class="v">48 · 64 · 96 · 128px</div></div>
    <div><span class="l">Tracking</span><div class="v">−0.03em <small>· uppercase only</small></div></div>
  </div>
</div></body></html>
