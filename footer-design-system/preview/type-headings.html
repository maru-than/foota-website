<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:6px;}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--line-1);padding:8px 0;}
  .row:last-child{border-bottom:none;}
  .spec{font-family:var(--font-ui);letter-spacing:-.03em;color:var(--fg-1);min-width:300px;}
  .meta{display:flex;gap:12px;font:600 11px/1 var(--font-ui);letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3);}
  .meta b{color:var(--fg-1);font-weight:700;}
  .h1{font-size:40px;font-weight:700;}
  .h2{font-size:32px;font-weight:700;}
  .h3{font-size:24px;font-weight:700;}
  .h4{font-size:18px;font-weight:600;}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="spec h1">Match-ready kits</div><div class="meta"><span>H1</span><b>40 / 700</b></div></div>
  <div class="row"><div class="spec h2">Match-ready kits</div><div class="meta"><span>H2</span><b>32 / 700</b></div></div>
  <div class="row"><div class="spec h3" style="color:var(--accent)">Spain</div><div class="meta"><span>H3 · kicker</span><b>24 / 700</b></div></div>
  <div class="row"><div class="spec h4">Home kit 2024/25</div><div class="meta"><span>H4</span><b>18 / 600</b></div></div>
</div></body></html>
