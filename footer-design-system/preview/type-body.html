<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:6px;}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--line-1);padding:8px 0;}
  .row:last-child{border-bottom:none;}
  .spec{font-family:var(--font-ui);letter-spacing:-.03em;min-width:340px;}
  .meta{display:flex;gap:12px;font:600 11px/1 var(--font-ui);letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3);}
  .meta b{color:var(--fg-1);font-weight:700;}
  .body{font-size:15px;font-weight:400;color:var(--fg-2);}
  .small{font-size:14px;font-weight:600;color:var(--fg-1);}
  .caption{font-size:12px;color:var(--fg-3);}
  .label{font-size:11px;letter-spacing:0;text-transform:uppercase;font-weight:400;color:var(--fg-3);}
  .price{font-size:14px;font-weight:700;color:var(--fg-1);font-variant-numeric:tabular-nums;}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="spec body">Crafted in collaboration with the clubs you love.</div><div class="meta"><span>Body</span><b>15 / 400</b></div></div>
  <div class="row"><div class="spec small">Free shipping over 60 €</div><div class="meta"><span>Small</span><b>14 / 600</b></div></div>
  <div class="row"><div class="spec price">29'99 $</div><div class="meta"><span>Price</span><b>14 / 700 · tnum</b></div></div>
  <div class="row"><div class="spec caption">Imported from Madrid, dispatched within 48 hours.</div><div class="meta"><span>Caption</span><b>12 / 400</b></div></div>
  <div class="row"><div class="spec label">New drop · Limited</div><div class="meta"><span>Label</span><b>11 / 400 upper</b></div></div>
</div></body></html>
