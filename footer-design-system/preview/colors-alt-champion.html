<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;height:84px;border:1px solid var(--line-1);display:flex;flex-direction:column;justify-content:space-between;padding:10px 12px;}
  .sw .n{font:600 11px/1 var(--font-ui);letter-spacing:.1em;text-transform:uppercase;}
  .sw .h{font:700 12px/1 var(--font-ui);letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
  .gold{background:#D4B26A;color:#111;border-color:transparent;}
  .gold-hi{background:#E8C994;color:#111;border-color:transparent;}
  .gold-lo{background:#B8924C;color:#111;border-color:transparent;}
  .beige{background:#E8DCC4;color:#111;border-color:transparent;}
  .beige-mute{background:#C7B894;color:#111;border-color:transparent;}
  .note{font:500 11px/1.4 var(--font-ui);color:var(--fg-3);letter-spacing:-.02em;margin-top:-4px;}
</style></head>
<body><div class="wrap">
  <div class="note">Alt "Champion" palette — premium / vintage jersey collections. Pairs with the same dark base.</div>
  <div class="row">
    <div class="sw gold"><span class="n">gold</span><span class="h">#D4B26A</span></div>
    <div class="sw gold-hi"><span class="n">gold-hi</span><span class="h">#E8C994</span></div>
    <div class="sw gold-lo"><span class="n">gold-lo</span><span class="h">#B8924C</span></div>
    <div class="sw beige"><span class="n">beige</span><span class="h">#E8DCC4</span></div>
    <div class="sw beige-mute"><span class="n">beige-mute</span><span class="h">#C7B894</span></div>
  </div>
</div></body></html>
