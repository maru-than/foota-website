<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .cell{background:var(--bg-2);height:100px;display:flex;flex-direction:column;justify-content:space-between;padding:12px 14px;}
  .b1{border:1px solid var(--line-1);}
  .b2{border:1px solid var(--line-2);}
  .b3{border:1px solid var(--line-accent);}
  .b4{border:1px solid var(--accent);}
  .glow{box-shadow:0 0 0 1px var(--accent),0 0 24px rgba(193,255,86,.32);border:1px solid var(--accent);}
  .float{box-shadow:0 8px 24px rgba(0,0,0,.4);border:1px solid var(--line-1);}
  .edge{box-shadow:0 1px 0 rgba(255,255,255,.04) inset;border:1px solid var(--line-1);}
  .plain{border:1px solid transparent;}
  .l{font:600 10px/1 var(--font-ui);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);}
  .v{font:700 12px/1 var(--font-ui);color:var(--fg-1);letter-spacing:-.03em;}
</style></head>
<body><div class="wrap">
  <div class="cell b1"><span class="l">line-1</span><span class="v">hairline · 8% white</span></div>
  <div class="cell b2"><span class="l">line-2</span><span class="v">divider · 16% white</span></div>
  <div class="cell b3"><span class="l">line-accent</span><span class="v">20% lime · default card</span></div>
  <div class="cell b4"><span class="l">accent solid</span><span class="v">1px lime · selected</span></div>
  <div class="cell edge"><span class="l">shadow-1</span><span class="v">edge highlight (inset)</span></div>
  <div class="cell float"><span class="l">shadow-2</span><span class="v">floating · 24px y8</span></div>
  <div class="cell glow"><span class="l">shadow-glow</span><span class="v">focus ring · 24px lime</span></div>
  <div class="cell plain"><span class="l">no border</span><span class="v">solid fill only</span></div>
</div></body></html>
