<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:18px;}
  .group{display:flex;align-items:center;gap:14px;}
  .l{min-width:80px;font:600 10px/1 var(--font-ui);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);}
  .size{width:40px;height:40px;border:1px solid var(--line-accent);display:flex;align-items:center;justify-content:center;font:700 14px/1 var(--font-ui);letter-spacing:-.03em;color:var(--fg-1);cursor:pointer;}
  .size:hover, .h{background:var(--accent-12);border-color:var(--accent);}
  .selected{background:var(--accent);color:#111;border-color:var(--accent);}
  .disabled{color:var(--fg-4);text-decoration:line-through;border-color:var(--line-1);cursor:not-allowed;}
  .more{color:var(--accent);border-color:var(--line-accent);}
</style></head>
<body><div class="wrap">
  <div class="group"><span class="l">Sizes</span>
    <div class="size">S</div><div class="size selected">M</div><div class="size">L</div><div class="size">XL</div><div class="size more">+2</div>
  </div>
  <div class="group"><span class="l">States</span>
    <div class="size h">S</div><div class="size selected">M</div><div class="size">L</div><div class="size disabled">XL</div>
    <span style="font:500 12px/1.3 var(--font-ui);color:var(--fg-3);letter-spacing:-.02em;">hover · selected · default · sold out</span>
  </div>
</div></body></html>
