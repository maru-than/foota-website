<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:24px 28px;display:flex;align-items:center;gap:32px;min-height:120px;}
  .logo{font-family:var(--font-display);font-size:80px;color:var(--accent);letter-spacing:-0.03em;line-height:1;text-transform:uppercase;}
  .meta{display:flex;flex-direction:column;gap:6px;border-left:1px solid var(--line-accent);padding-left:24px;}
  .meta .l{font:600 11px/1 var(--font-ui);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);}
  .meta .v{font:700 14px/1.2 var(--font-ui);color:var(--fg-1);letter-spacing:-.03em;}
  .meta .v small{color:var(--fg-3);font-weight:500;}
</style></head>
<body><div class="card">
  <div class="logo">FOOTA</div>
  <div class="meta">
    <div><span class="l">Tagline</span><div class="v">The home of soccer jerseys</div></div>
    <div><span class="l">Display Font</span><div class="v">Sonara <small>· 64–96px · uppercase</small></div></div>
    <div><span class="l">Voice</span><div class="v">Sport · energetic · linear</div></div>
  </div>
</div></body></html>
