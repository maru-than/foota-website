<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:24px 24px;display:flex;align-items:center;gap:20px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:84px;height:64px;background:var(--bg-3);border:1px solid var(--line-accent);display:flex;align-items:center;justify-content:center;font:700 14px/1 var(--font-ui);color:var(--accent);letter-spacing:-.03em;}
  .r0{border-radius:0;}
  .r1{border-radius:2px;}
  .r2{border-radius:4px;}
  .rpill{border-radius:999px;width:120px;}
  .l{font:600 11px/1 var(--font-ui);letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3);}
  .v{font:700 12px/1 var(--font-ui);color:var(--fg-1);font-variant-numeric:tabular-nums;}
  .note{margin-left:auto;max-width:200px;font:500 12px/1.45 var(--font-ui);color:var(--fg-3);letter-spacing:-.02em;border-left:1px solid var(--line-accent);padding-left:16px;}
  .note b{color:var(--accent);font-weight:700;}
</style></head>
<body><div class="wrap">
  <div class="col"><div class="box r0">0</div><span class="l">r-0 · default</span><span class="v">0px</span></div>
  <div class="col"><div class="box r1">2</div><span class="l">r-1 · accent</span><span class="v">2px</span></div>
  <div class="col"><div class="box r2">4</div><span class="l">r-2</span><span class="v">4px</span></div>
  <div class="col"><div class="box rpill">pill</div><span class="l">r-pill · tag</span><span class="v">999</span></div>
  <div class="note"><b>Sharp by default.</b> Use r-1/r-2 only on micro-interactions (toasts, focus rings). r-pill for jersey/team tags.</div>
</div></body></html>
