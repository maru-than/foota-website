<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;height:84px;border:1px solid var(--line-1);display:flex;flex-direction:column;justify-content:space-between;padding:10px 12px;position:relative;}
  .sw .n{font:600 11px/1 var(--font-ui);letter-spacing:.1em;text-transform:uppercase;}
  .sw .h{font:700 12px/1 var(--font-ui);letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
  .b0{background:#0A0A0A;color:var(--fg-1);}
  .b1{background:#111111;color:var(--fg-1);}
  .b2{background:#181818;color:var(--fg-1);}
  .b3{background:#222222;color:var(--fg-1);}
  .b4{background:#2C2C2C;color:var(--fg-1);}
  .accent{background:var(--accent);color:#111;border-color:transparent;}
  .accent-hi{background:var(--accent-hi);color:#111;border-color:transparent;}
  .accent-lo{background:var(--accent-lo);color:#111;border-color:transparent;}
  .accent-20{background:#222;border:1px solid var(--accent-20);color:var(--accent);}
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="sw b0"><span class="n">bg-0 · pitch</span><span class="h">#0A0A0A</span></div>
    <div class="sw b1"><span class="n">bg-1 · surface</span><span class="h">#111111</span></div>
    <div class="sw b2"><span class="n">bg-2 · card</span><span class="h">#181818</span></div>
    <div class="sw b3"><span class="n">bg-3 · elevated</span><span class="h">#222222</span></div>
    <div class="sw b4"><span class="n">bg-4 · hover</span><span class="h">#2C2C2C</span></div>
  </div>
  <div class="row">
    <div class="sw accent"><span class="n">accent · voltron</span><span class="h">#C1FF56</span></div>
    <div class="sw accent-hi"><span class="n">accent-hi · hover</span><span class="h">#D4FF7A</span></div>
    <div class="sw accent-lo"><span class="n">accent-lo · press</span><span class="h">#A8E640</span></div>
    <div class="sw accent-20"><span class="n">accent-20 · line</span><span class="h">20% lime</span></div>
  </div>
</div></body></html>
