<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:24px 24px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:center;gap:14px;}
  .bar{background:var(--accent);height:14px;}
  .l{min-width:64px;font:600 11px/1 var(--font-ui);letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3);}
  .v{min-width:48px;font:700 12px/1 var(--font-ui);color:var(--fg-1);font-variant-numeric:tabular-nums;}
  .desc{font:500 11px/1.3 var(--font-ui);color:var(--fg-3);letter-spacing:-.02em;}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="l">s-1</span><span class="v">4px</span><div class="bar" style="width:4px"></div><span class="desc">hairline gap</span></div>
  <div class="row"><span class="l">s-2</span><span class="v">8px</span><div class="bar" style="width:8px"></div><span class="desc">chip gap</span></div>
  <div class="row"><span class="l">s-3</span><span class="v">12px</span><div class="bar" style="width:12px"></div><span class="desc">stack gap (figma)</span></div>
  <div class="row"><span class="l">s-4</span><span class="v">16px</span><div class="bar" style="width:16px"></div><span class="desc">inline button</span></div>
  <div class="row"><span class="l">s-5</span><span class="v">20px</span><div class="bar" style="width:20px"></div><span class="desc">grid gutter</span></div>
  <div class="row"><span class="l">s-6</span><span class="v">24px</span><div class="bar" style="width:24px"></div><span class="desc">card padding (figma)</span></div>
  <div class="row"><span class="l">s-7</span><span class="v">32px</span><div class="bar" style="width:32px"></div><span class="desc">section inner</span></div>
  <div class="row"><span class="l">s-8</span><span class="v">40px</span><div class="bar" style="width:40px"></div><span class="desc">section pad</span></div>
  <div class="row"><span class="l">s-10</span><span class="v">64px</span><div class="bar" style="width:64px"></div><span class="desc">page gutter</span></div>
  <div class="row"><span class="l">s-12</span><span class="v">96px</span><div class="bar" style="width:96px"></div><span class="desc">hero margin</span></div>
</div></body></html>
