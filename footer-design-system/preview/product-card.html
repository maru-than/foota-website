<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:24px;display:flex;gap:18px;}
  .card{width:300px;background:var(--bg-3);display:flex;flex-direction:column;}
  .img{height:240px;background:radial-gradient(140% 80% at 50% 35%, #2c2c2c 0%, #161616 70%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .img::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 28px,rgba(193,255,86,.04) 28px 30px);}
  .ph{font:700 13px/1 var(--font-ui);letter-spacing:.14em;text-transform:uppercase;color:var(--fg-4);position:relative;z-index:2;}
  .body{border:1px solid var(--line-accent);padding:24px;display:flex;flex-direction:column;gap:12px;border-top:none;}
  .kicker{font:700 24px/1 var(--font-ui);letter-spacing:-.03em;color:var(--accent);}
  .price{font:700 14px/1 var(--font-ui);letter-spacing:-.03em;color:var(--fg-1);}
  .sizes{display:flex;gap:4px;margin-top:4px;}
  .sz{width:40px;height:40px;border:1px solid var(--line-accent);display:flex;align-items:center;justify-content:center;font:700 14px/1 var(--font-ui);letter-spacing:-.03em;color:var(--fg-1);}
  .sz.more{color:var(--accent);}
  .meta{display:flex;flex-direction:column;gap:8px;flex:1;}
  .note{font:500 12px/1.45 var(--font-ui);color:var(--fg-3);letter-spacing:-.02em;border-left:1px solid var(--line-accent);padding-left:14px;max-width:240px;}
  .note b{color:var(--accent);font-weight:700;}
</style></head>
<body><div class="wrap">
  <div class="card">
    <div class="img"><span class="ph">Jersey image</span></div>
    <div class="body">
      <div class="meta">
        <span class="kicker">Spain</span>
        <span class="price">29'99 $</span>
      </div>
      <div class="sizes"><div class="sz">S</div><div class="sz">M</div><div class="sz">L</div><div class="sz">XL</div><div class="sz more">+2</div></div>
    </div>
  </div>
  <div class="note">
    <b>Card anatomy (from Figma).</b><br><br>
    300×500 frame · #222 fill · accent-20 hairline · image fills upper 343px · meta block 24px-padded · kicker = country/club in accent green · sizes are 40px squares with accent-20 borders · "+N" overflow indicator in accent green.
  </div>
</div></body></html>
